<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITE KIOSK v2.0</title>
    <style>
        :root {
            --primary-red: #d90429;
            --accent-yellow: #ffb703;
            --bg-black: #0f0f0f;
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding-bottom: 120px; /* Space for fixed cart bar */
        }

        /* Header */
        .header {
            background: var(--primary-red);
            padding: 25px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }

        /* Category Scroll */
        .categories {
            display: flex;
            overflow-x: auto;
            background: #111;
            padding: 10px;
            gap: 10px;
            white-space: nowrap;
        }

        .cat-btn {
            background: none;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .cat-btn.active {
            background: var(--accent-yellow);
            color: #000;
            border-color: var(--accent-yellow);
        }

        /* Menu Grid */
        .container { padding: 15px; }

        .menu-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .info h3 { margin: 0; font-size: 1.1rem; }
        .info p { margin: 5px 0 0; font-size: 0.8rem; color: #999; }
        
        .add-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }

        .add-btn:active { transform: scale(0.9); }

        /* Floating Cart Bar */
        .cart-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1a1a1a;
            padding: 20px;
            box-sizing: border-box;
            border-top: 2px solid var(--accent-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }

        .cart-info { font-weight: bold; }
        .cart-info span { color: var(--accent-yellow); font-size: 1.2rem; }

        .order-submit {
            background: var(--accent-yellow);
            color: #000;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 900;
            border: none;
            font-size: 1rem;
        }

        /* Order Animation Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>INFINITE KIOSK</h1>
        <p style="margin:0; font-size: 0.8rem; color: #ffb703;">ALL-YOU-CAN-ORDER</p>
    </div>

    <div class="categories">
        <button class="cat-btn active">Burgers</button>
        <button class="cat-btn">Sides</button>
        <button class="cat-btn">Pizza</button>
        <button class="cat-btn">Drinks</button>
    </div>

    <div class="container" id="menu-list">
        </div>

    <div class="cart-bar">
        <div class="cart-info">
            Items: <span id="item-count">0</span><br>
            Total: <span id="total-price">$0.00</span>
        </div>
        <button class="order-submit" onclick="submitOrder()">PLACE ORDER</button>
    </div>

    <div id="overlay">
        <div>
            <h1 style="color: var(--accent-yellow);">ORDER PLACED!</h1>
            <p>Your infinite feast is being prepared...</p>
            <button onclick="closeOverlay()" style="background:none; border: 1px solid #fff; color:#fff; padding:10px 20px; border-radius:5px;">Close</button>
        </div>
    </div>

    <script>
        const menuItems = [
            { name: "Double Beef Smash", desc: "Two beefy patties & cheese", price: 0 },
            { name: "Spicy Nashville Chicken", desc: "Nashville hot glaze & slaw", price: 0 },
            { name: "Bacon Smokehouse King", desc: "Thick bacon & BBQ sauce", price: 0 },
            { name: "Cajun Dynamite Fries", desc: "Spicy Cajun spice blend", price: 0 },
            { name: "Mozzarella Volcano", desc: "Molten cheese center balls", price: 0 },
            { name: "Ultimate Pepperoni", desc: "Triple layered pepperoni", price: 0 },
            { name: "Real Vanilla Shake", desc: "Premium vanilla bean shake", price: 0 }
        ];

        let count = 0;

        function renderMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = menuItems.map(item => `
                <div class="menu-card">
                    <div class="info">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <button class="add-btn" onclick="addToCart()">+</button>
                </div>
            `).join('');
        }

        function addToCart() {
            count++;
            document.getElementById('item-count').innerText = count;
            // Total price stays $0 because it's unlimited!
        }

        function submitOrder() {
            if(count === 0) {
                alert("Please add at least one item!");
                return;
            }
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
            count = 0;
            document.getElementById('item-count').innerText = count;
        }

        renderMenu();
    </script>
</body>
</html>
